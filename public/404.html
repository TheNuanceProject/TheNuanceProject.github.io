<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#FAF9F5" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1A1A18" media="(prefers-color-scheme: dark)" />
    <title>The Nuance Project</title>
    <meta name="robots" content="noindex" />

    <!--
      SPA fallback for GitHub Pages.

      GitHub Pages is a static host — it only serves files that exist on disk.
      A single-page app with client-side routing (React Router) only has one
      HTML file (index.html) at the root. Deep links like /projects or
      /writing/some-article would normally 404, because no file exists at
      those paths.

      GitHub Pages serves THIS file (404.html) for any unknown path. We use
      that to redirect the browser back to the root, smuggling the original
      path through the URL's query string. index.html's companion script
      then unpacks it and hands it to React Router via history.replaceState,
      which preserves the URL in the address bar.

      Approach by rafgraph / spa-github-pages — battle-tested on thousands
      of sites. https://github.com/rafgraph/spa-github-pages
    -->
    <script>
      (function () {
        // pathSegmentsToKeep: number of path segments to preserve as-is.
        // For a user/org site at the apex domain (thenuanceproject.com),
        // no segments are repo-scoped, so this is 0.
        // For a project site at user.github.io/repo-name, this would be 1.
        var pathSegmentsToKeep = 0;

        var l = window.location;
        l.replace(
          l.protocol +
            '//' +
            l.hostname +
            (l.port ? ':' + l.port : '') +
            l.pathname
              .split('/')
              .slice(0, 1 + pathSegmentsToKeep)
              .join('/') +
            '/?/' +
            l.pathname
              .slice(1)
              .split('/')
              .slice(pathSegmentsToKeep)
              .join('/')
              .replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
