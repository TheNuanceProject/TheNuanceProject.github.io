<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#FAF9F5" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1A1A18" media="(prefers-color-scheme: dark)" />

    <!-- Prevent flash of unstyled content / wrong theme -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('nuance-theme');
          var systemDark = window.matchMedia(
            '(prefers-color-scheme: dark)'
          ).matches;
          var theme = stored || (systemDark ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          /* no-op */
        }
      })();
    </script>

    <!--
      SPA path restoration for GitHub Pages.

      When a user hits a deep link like /projects, GitHub Pages serves
      404.html (because no file exists at /projects). 404.html's script
      redirects here with the original path encoded in the query string
      as `?/projects`. This block unpacks that and rewrites the address
      bar back to the original URL using history.replaceState — no page
      reload, no flash, React Router picks up the URL on mount as if
      the user had typed it directly (and it worked).

      Must run BEFORE the main app script so the URL is correct by the
      time React Router reads location.pathname.
    -->
    <script>
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      })(window.location);
    </script>

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="mask-icon" href="/favicon.svg" color="#D97757" />

    <!-- Canonical URL (per-page overrides inject canonical in the App) -->
    <link rel="canonical" href="https://thenuanceproject.com/" />

    <!-- Primary SEO -->
    <title>The Nuance Project</title>
    <meta
      name="description"
      content="A small studio for software, writing, and the work that lives outside of working hours."
    />
    <meta name="author" content="Mohamad Shahin Ambalatha Kandy" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (Facebook, LinkedIn, Slack previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="The Nuance Project" />
    <meta property="og:url" content="https://thenuanceproject.com/" />
    <meta property="og:title" content="The Nuance Project" />
    <meta
      property="og:description"
      content="A small studio for software, writing, and the work that lives outside of working hours."
    />
    <meta property="og:image" content="https://thenuanceproject.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="The Nuance Project" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://thenuanceproject.com/" />
    <meta name="twitter:title" content="The Nuance Project" />
    <meta
      name="twitter:description"
      content="A small studio for software, writing, and the work that lives outside of working hours."
    />
    <meta name="twitter:image" content="https://thenuanceproject.com/og-image.png" />

    <!-- Fonts: Poppins (display) + Lora (body) + JetBrains Mono (code) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Poppins:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
